<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meus Projetos WEB</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', 'Inter', sans-serif;
      background: #111;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 0.82rem;
      color: #555;
      font-weight: 300;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #2a2a2a;
      margin: 1.5rem auto;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      max-width: 420px;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161616;
      padding: 1.2rem 1.4rem;
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #222;
      transition: background 0.18s;
      gap: 1rem;
    }

    .card:last-child { border-bottom: none; }

    .card:hover { background: #1e1e1e; }

    .card-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-num {
      font-size: 0.68rem;
      color: #383838;
      font-weight: 400;
      letter-spacing: 0.05em;
      min-width: 20px;
    }

    .card-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2a2a2a;
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .card:hover .card-dot { background: #6ee7b7; }

    .card-title {
      font-size: 0.92rem;
      font-weight: 400;
      color: #d4d4d4;
    }

    .card-desc {
      font-size: 0.76rem;
      color: #484848;
      margin-top: 0.15rem;
      font-weight: 300;
    }

    .card-arrow {
      font-size: 0.85rem;
      color: #333;
      flex-shrink: 0;
      transition: color 0.18s, transform 0.18s;
    }
    .card:hover .card-arrow {
      color: #888;
      transform: translateX(2px);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Projetos de WEB</h1>
    <p>Henrique Oliveira · Sistemas de Informação</p>
  </header>

  <div class="divider"></div>

  <div class="cards">

    <a href="./projeto-html-css-1/index.html" target="_blank" class="card">
      <div class="card-left">
        <span class="card-num">01</span>
        <span class="card-dot"></span>
        <div>
          <div class="card-title">Projeto 1</div>
          <div class="card-desc">Projeto Site WEB 1</div>
        </div>
      </div>
      <span class="card-arrow">↗</span>
    </a>

    <a href="./projeto-html-css-2/index.html" target="_blank" class="card">
      <div class="card-left">
        <span class="card-num">02</span>
        <span class="card-dot"></span>
        <div>
          <div class="card-title">Projeto 2</div>
          <div class="card-desc">Projeto Site WEB 2</div>
        </div>
      </div>
      <span class="card-arrow">↗</span>
    </a>

    <a href="./projeto-html-css-3/index.html" target="_blank" class="card">
      <div class="card-left">
        <span class="card-num">03</span>
        <span class="card-dot"></span>
        <div>
          <div class="card-title">Projeto 2</div>
          <div class="card-desc">Projeto Site WEB 3</div>
        </div>
      </div>
      <span class="card-arrow">↗</span>
    </a>

  </div>

  <footer>© 2025 · Feito por Henrique Oliveira</footer>

</body>
</html>
